<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SafeSight — Hazard Report Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://npmcdn.com/parse/dist/parse.min.js"></script>
<style>
  :root {
    --orange: #FF6B1A;
    --dark: #0D0F12;
    --surface: #161A1F;
    --card: #1E2329;
    --border: #2C3440;
    --text: #E8ECF0;
    --muted: #7A8899;
    --success: #22C55E;
    --danger: #EF4444;
    --radius: 10px;
    --radius-lg: 16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-repeat: repeat; background-size: 200px;
    pointer-events: none; z-index: 0;
  }

  /* ── TOPBAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,15,18,0.92);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    padding: 0 24px; height: 58px;
  }

  .topbar-icon {
    width: 34px; height: 34px;
    background: var(--orange); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .topbar-icon svg { width: 18px; height: 18px; fill: #fff; }

  .topbar-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.2rem; font-weight: 800;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  .topbar-title span { color: var(--orange); }

  .topbar-ref {
    margin-left: auto;
    font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px;
  }
  .topbar-ref span { color: var(--orange); }

  /* ── LAYOUT ── */
  .layout {
    position: relative; z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 28px 16px 80px;
  }

  /* ── STATES ── */
  .state-box {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; min-height: 60vh; text-align: center;
  }

  .state-icon {
    width: 64px; height: 64px; border-radius: 16px;
    background: rgba(255,107,26,0.1);
    display: flex; align-items: center; justify-content: center;
  }
  .state-icon svg { width: 32px; height: 32px; }

  .state-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.5rem; font-weight: 800;
    text-transform: uppercase; color: var(--text);
  }
  .state-sub { font-size: 0.88rem; color: var(--muted); max-width: 340px; line-height: 1.6; }

  .spinner-lg {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── REPORT CARD ── */
  .report-header {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 12px;
    display: flex; align-items: flex-start; gap: 18px;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .report-header-icon {
    width: 52px; height: 52px; flex-shrink: 0;
    border-radius: 12px;
    background: rgba(255,107,26,0.12);
    border: 1px solid rgba(255,107,26,0.3);
    display: flex; align-items: center; justify-content: center;
  }
  .report-header-icon svg { width: 26px; height: 26px; }

  .report-header-text { flex: 1; min-width: 0; }

  .report-eyebrow {
    font-size: 0.68rem; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--orange); margin-bottom: 4px;
  }

  .report-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.4rem; font-weight: 800;
    text-transform: uppercase; color: var(--text);
    line-height: 1.1; margin-bottom: 8px;
  }

  .report-meta {
    display: flex; gap: 8px; flex-wrap: wrap;
  }

  .meta-chip {
    font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.06em;
    padding: 3px 10px; border-radius: 20px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted);
  }

  /* ── SECTION ── */
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 10px;
    animation: fadeUp 0.4s ease both;
  }

  .section:nth-child(2)  { animation-delay: 0.05s; }
  .section:nth-child(3)  { animation-delay: 0.10s; }
  .section:nth-child(4)  { animation-delay: 0.15s; }
  .section:nth-child(5)  { animation-delay: 0.20s; }
  .section:nth-child(6)  { animation-delay: 0.25s; }

  .section-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }

  .section-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--orange); flex-shrink: 0;
  }

  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.88rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted);
  }

  .section-body { padding: 18px 20px; }

  /* ── FIELDS GRID ── */
  .fields-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .field-item { display: flex; flex-direction: column; gap: 4px; }

  .field-label {
    font-size: 0.66rem; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted);
  }

  .field-value {
    font-size: 0.95rem; font-weight: 500;
    color: var(--text); line-height: 1.4;
  }

  .field-value.large {
    font-size: 0.92rem; line-height: 1.6;
    white-space: pre-wrap;
  }

  /* ── GPS BOX ── */
  .gps-box {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }

  .gps-icon {
    width: 38px; height: 38px; flex-shrink: 0;
    background: rgba(255,107,26,0.1); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .gps-icon svg { width: 18px; height: 18px; }

  .gps-coords { display: flex; gap: 10px; flex-wrap: wrap; }

  .coord-chip {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.88rem; font-weight: 700;
    color: var(--orange);
    background: rgba(255,107,26,0.1);
    border-radius: 5px; padding: 3px 10px;
  }

  /* ── STATUS BADGES ── */
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase;
  }

  .badge-green { background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3); color: var(--success); }
  .badge-red   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.25); color: var(--danger); }
  .badge-orange{ background: rgba(255,107,26,0.12); border: 1px solid rgba(255,107,26,0.3); color: var(--orange); }
  .badge-gray  { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }

  .badge::before {
    content: '';
    width: 7px; height: 7px; border-radius: 50%;
    background: currentColor;
  }

  /* ── STATUS ROW ── */
  .status-row {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }

  /* ── MEDIA GRID ── */
  .media-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }

  .media-card {
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.18s, transform 0.15s;
    position: relative;
  }

  .media-card:hover {
    border-color: var(--orange);
    transform: scale(1.02);
  }

  .media-card img,
  .media-card video {
    width: 100%; display: block;
    aspect-ratio: 4/3; object-fit: cover;
  }

  .media-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    padding: 20px 8px 6px;
    font-size: 0.68rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: #fff;
  }

  .media-type-badge {
    position: absolute; top: 6px; left: 6px;
    background: rgba(0,0,0,0.7);
    font-size: 0.6rem; font-weight: 700;
    text-transform: uppercase; color: #FFD600;
    padding: 2px 6px; border-radius: 3px;
  }

  .no-media {
    color: var(--muted); font-size: 0.88rem;
    font-style: italic; text-align: center;
    padding: 28px 0;
  }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none;
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.95);
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .lightbox.open { display: flex; }

  .lightbox-inner {
    position: relative;
    max-width: 92vw; max-height: 90vh;
    display: flex; align-items: center; justify-content: center;
  }

  .lightbox-inner img,
  .lightbox-inner video {
    max-width: 100%; max-height: 86vh;
    border-radius: var(--radius-lg);
    object-fit: contain;
  }

  .lightbox-close {
    position: fixed; top: 18px; right: 18px;
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.12);
    border: none; border-radius: 50%;
    color: #fff; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .lightbox-close:hover { background: rgba(255,255,255,0.25); }

  /* ── MAP LINK ── */
  .btn-map {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,107,26,0.1);
    border: 1px solid rgba(255,107,26,0.35);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.88rem; font-weight: 700;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--orange);
    text-decoration: none;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 4px;
  }
  .btn-map:hover { background: rgba(255,107,26,0.22); transform: translateY(-1px); }
  .btn-map:active { transform: scale(0.97); }
  .btn-map svg { width: 16px; height: 16px; flex-shrink: 0; }

  /* ── LIGHTBOX SAVE BUTTON ── */
  .lightbox-save {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
    background: var(--orange);
    border: none; border-radius: 30px;
    padding: 11px 24px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem; font-weight: 800;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: #fff; cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,107,26,0.45);
    transition: background 0.15s, transform 0.1s;
    z-index: 10;
  }
  .lightbox-save:hover { background: #cc5514; transform: translateY(-1px); }
  .lightbox-save svg { width: 16px; height: 16px; }

  /* ── PRINT BUTTON ── */
  .btn-print {
    display: flex; align-items: center; gap: 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.82rem; font-weight: 700;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-print:hover { border-color: var(--text); color: var(--text); }
  .btn-print svg { width: 15px; height: 15px; }

  .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  @media print {
    .topbar, .lightbox, .btn-print { display: none !important; }
    body { background: #fff; color: #000; }
    .section, .report-header { border: 1px solid #ddd; }
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-icon">
    <svg viewBox="0 0 24 24"><path d="M12 2L1 21h22L12 2zm0 3.5L20.5 19h-17L12 5.5zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/></svg>
  </div>
  <div class="topbar-title">SafeSight <span>Report Viewer</span></div>
  <div class="topbar-actions">
    <div class="topbar-ref" id="topRef">REF: <span>—</span></div>
    <button class="btn-print" onclick="window.print()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Print
    </button>
  </div>
</header>

<!-- MAIN -->
<div class="layout" id="mainLayout">
  <div class="state-box" id="stateLoading">
    <div class="spinner-lg"></div>
    <div class="state-title">Loading Report</div>
    <div class="state-sub">Fetching report from the database…</div>
  </div>
  <div class="state-box" id="stateError" style="display:none">
    <div class="state-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <div class="state-title">Report Not Found</div>
    <div class="state-sub" id="errorMsg">The report ID in this link is invalid or the report has been deleted.</div>
  </div>
  <div id="reportContent" style="display:none"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <div class="lightbox-inner" id="lightboxInner" onclick="event.stopPropagation()"></div>
  <button class="lightbox-save" id="lightboxSaveBtn" style="display:none" onclick="event.stopPropagation()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Save to Device
  </button>
</div>

<script>
// ── PARSE INIT ──
const APP_ID   = "mPr3rM2GOSsxKEcvZlZ0ACyoPeTVoVp1e4jpmYbY";
const JS_KEY   = "JJfB7j8rh85DWfvShCovbx2TA36hzq6c2L9yxDA2";
const BASE_URL = "https://parseapi.back4app.com";

Parse.initialize(APP_ID, JS_KEY);
Parse.serverURL = BASE_URL;

// ── LOAD REPORT ──
async function loadReport() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    showError('No report ID provided in the URL.');
    return;
  }

  try {
    const HazardReport = Parse.Object.extend('HazardReport');
    const query = new Parse.Query(HazardReport);
    const report = await query.get(id);
    renderReport(report);
  } catch (err) {
    showError(`Could not load report (${err.message}). Make sure the link is correct and the report exists.`);
  }
}

function showError(msg) {
  document.getElementById('stateLoading').style.display = 'none';
  document.getElementById('stateError').style.display = 'flex';
  document.getElementById('errorMsg').textContent = msg;
}

function renderReport(r) {
  document.getElementById('stateLoading').style.display = 'none';

  const id       = r.id;
  const date     = r.get('date') || '—';
  const name     = r.get('name') || '—';
  const idNum    = r.get('idNumber') || '—';
  const dept     = r.get('department') || '—';
  const location = r.get('locationDescription') || '—';
  const desc     = r.get('hazardDescription') || '—';
  const action   = r.get('actionTaken') || '—';
  const followup = r.get('followUpRequired') || '—';
  const followupD= r.get('followUpDetails') || '';
  const risk     = r.get('riskControlled') || '—';
  const media    = r.get('mediaFiles') || [];
  const lat      = r.get('gpsLatitude');
  const lng      = r.get('gpsLongitude');
  const alt      = r.get('gpsAltitude');

  // Update topbar ref
  document.getElementById('topRef').innerHTML = `REF: <span>${id}</span>`;

  // Build GPS block with map deep-link
  // Works on iOS (maps://), Android (geo:), and falls back to Google Maps web
  const gpsHtml = (lat !== undefined && lat !== null) ? `
    <div class="gps-box" style="flex-direction:column;align-items:flex-start;gap:12px">
      <div style="display:flex;align-items:center;gap:12px;width:100%">
        <div class="gps-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#FF6B1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </div>
        <div class="gps-coords">
          <span class="coord-chip">X: ${lat.toFixed(6)}</span>
          <span class="coord-chip">Y: ${lng.toFixed(6)}</span>
          <span class="coord-chip">Z: ${alt !== null && alt !== undefined ? alt.toFixed(1) + ' m' : 'N/A'}</span>
        </div>
      </div>
      <a class="btn-map" href="geo:${lat},${lng}?q=${lat},${lng}(Hazard+Location)" 
         onclick="openMap(event, ${lat}, ${lng})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="3 11 22 2 13 21 11 13 3 11"/>
        </svg>
        Open in Maps
      </a>
    </div>` : `<div style="color:var(--muted);font-size:0.85rem;font-style:italic">GPS not captured</div>`;

  // Action badge
  const actionBadge = action === 'Fixed'
    ? `<span class="badge badge-green">Fixed</span>`
    : `<span class="badge badge-orange">Reported</span>`;

  // Followup badge
  const followupBadge = followup === 'Yes'
    ? `<span class="badge badge-orange">Follow-up Required</span>`
    : `<span class="badge badge-gray">No Follow-up</span>`;

  // Risk badge
  const riskBadge = risk === 'Yes'
    ? `<span class="badge badge-green">Risk Controlled</span>`
    : `<span class="badge badge-red">Risk NOT Controlled</span>`;

  // Media section
  let mediaHtml = '';
  if (media.length === 0) {
    mediaHtml = `<div class="no-media">No media attached to this report.</div>`;
  } else {
    const cards = media.map((m, i) => {
      const src = `data:${m.mimeType};base64,${m.data}`;
      if (m.type === 'video') {
        return `
          <div class="media-card" onclick="openLightboxVideo('${i}')">
            <video src="${src}" muted preload="metadata"></video>
            <div class="media-type-badge">VIDEO</div>
            <div class="media-label">${escHtml(m.name)}</div>
          </div>`;
      } else {
        return `
          <div class="media-card" onclick="openLightboxImg('${i}')">
            <img src="${src}" alt="${escHtml(m.name)}" loading="lazy" />
            <div class="media-label">${escHtml(m.name)}</div>
          </div>`;
      }
    }).join('');
    // Add "Save All" button if multiple images
    const saveAllBtn = media.filter(m => m.type === 'image').length > 0
      ? `<div style="margin-top:12px;display:flex;justify-content:flex-end">
           <button onclick="saveAllImages()" style="
             display:flex;align-items:center;gap:6px;
             background:rgba(255,107,26,0.1);border:1px solid rgba(255,107,26,0.3);
             border-radius:8px;padding:8px 14px;cursor:pointer;
             font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;font-weight:700;
             letter-spacing:0.07em;text-transform:uppercase;color:var(--orange);">
             <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
             Save All Photos
           </button>
         </div>`
      : '';
    mediaHtml = `<div class="media-grid">${cards}</div>${saveAllBtn}`;
  }

  // Store media globally for lightbox
  window._reportMedia = media;

  const followupDetailsHtml = (followup === 'Yes' && followupD) ? `
    <div class="section" style="animation-delay:0.22s">
      <div class="section-header">
        <div class="section-dot"></div>
        <div class="section-title">Follow-up Action Details</div>
      </div>
      <div class="section-body">
        <div class="field-value large">${escHtml(followupD)}</div>
      </div>
    </div>` : '';

  const html = `
    <!-- HEADER CARD -->
    <div class="report-header">
      <div class="report-header-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#FF6B1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
      </div>
      <div class="report-header-text">
        <div class="report-eyebrow">Hazard Report · Ref ${id}</div>
        <div class="report-title">${escHtml(location)}</div>
        <div class="report-meta">
          <span class="meta-chip">${escHtml(date)}</span>
          <span class="meta-chip">${escHtml(dept)}</span>
          <span class="meta-chip">${media.length} media file${media.length !== 1 ? 's' : ''}</span>
        </div>
      </div>
    </div>

    <!-- REPORTER -->
    <div class="section">
      <div class="section-header">
        <div class="section-dot"></div>
        <div class="section-title">Reporter Information</div>
      </div>
      <div class="section-body">
        <div class="fields-grid">
          <div class="field-item"><div class="field-label">Name</div><div class="field-value">${escHtml(name)}</div></div>
          <div class="field-item"><div class="field-label">ID Number</div><div class="field-value">${escHtml(idNum)}</div></div>
          <div class="field-item"><div class="field-label">Department</div><div class="field-value">${escHtml(dept)}</div></div>
          <div class="field-item"><div class="field-label">Date</div><div class="field-value">${escHtml(date)}</div></div>
        </div>
      </div>
    </div>

    <!-- LOCATION -->
    <div class="section">
      <div class="section-header">
        <div class="section-dot"></div>
        <div class="section-title">Location of Hazard</div>
      </div>
      <div class="section-body" style="display:flex;flex-direction:column;gap:14px">
        <div class="field-item">
          <div class="field-label">Location Description</div>
          <div class="field-value">${escHtml(location)}</div>
        </div>
        ${gpsHtml}
      </div>
    </div>

    <!-- HAZARD DESCRIPTION -->
    <div class="section">
      <div class="section-header">
        <div class="section-dot"></div>
        <div class="section-title">Hazard Description</div>
      </div>
      <div class="section-body">
        <div class="field-value large">${escHtml(desc)}</div>
      </div>
    </div>

    <!-- ACTIONS & STATUS -->
    <div class="section">
      <div class="section-header">
        <div class="section-dot"></div>
        <div class="section-title">Actions & Status</div>
      </div>
      <div class="section-body" style="display:flex;flex-direction:column;gap:14px">
        <div class="field-item">
          <div class="field-label">Action Taken</div>
          <div class="status-row" style="margin-top:4px">${actionBadge}</div>
        </div>
        <div class="field-item">
          <div class="field-label">Follow-up & Risk</div>
          <div class="status-row" style="margin-top:4px">${followupBadge} ${riskBadge}</div>
        </div>
      </div>
    </div>

    ${followupDetailsHtml}

    <!-- MEDIA -->
    <div class="section">
      <div class="section-header">
        <div class="section-dot"></div>
        <div class="section-title">Photo / Video Evidence (${media.length})</div>
      </div>
      <div class="section-body">${mediaHtml}</div>
    </div>
  `;

  const content = document.getElementById('reportContent');
  content.innerHTML = html;
  content.style.display = 'block';
}

// ── LIGHTBOX ──
let _currentMediaIndex = -1;

function openLightboxImg(i) {
  _currentMediaIndex = i;
  const m = window._reportMedia[i];
  const src = `data:${m.mimeType};base64,${m.data}`;
  document.getElementById('lightboxInner').innerHTML = `<img src="${src}" alt="${escHtml(m.name)}" />`;
  document.getElementById('lightboxSaveBtn').style.display = 'flex';
  document.getElementById('lightboxSaveBtn').onclick = () => saveMedia(i);
  document.getElementById('lightbox').classList.add('open');
}

function openLightboxVideo(i) {
  _currentMediaIndex = i;
  const m = window._reportMedia[i];
  const src = `data:${m.mimeType};base64,${m.data}`;
  document.getElementById('lightboxInner').innerHTML = `<video src="${src}" controls autoplay style="max-width:90vw;max-height:85vh;border-radius:12px"></video>`;
  document.getElementById('lightboxSaveBtn').style.display = 'flex';
  document.getElementById('lightboxSaveBtn').onclick = () => saveMedia(i);
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxInner').innerHTML = '';
}

// ── SAVE MEDIA ──
function saveMedia(i) {
  const m = window._reportMedia[i];
  const a = document.createElement('a');
  a.href = `data:${m.mimeType};base64,${m.data}`;
  a.download = m.name || `hazard-media-${i + 1}`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function saveAllImages() {
  const images = window._reportMedia.filter(m => m.type === 'image');
  if (images.length === 0) return;
  images.forEach((m, idx) => {
    setTimeout(() => {
      const origIdx = window._reportMedia.indexOf(m);
      saveMedia(origIdx);
    }, idx * 400); // stagger downloads so browser doesn't block them
  });
}

// ── OPEN MAP ──
function openMap(e, lat, lng) {
  e.preventDefault();
  const label = encodeURIComponent('Hazard Location');
  // iOS: try Apple Maps first via maps:// scheme
  // Android & fallback: geo: or Google Maps web
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  if (isIOS) {
    // Apple Maps deep link
    window.location.href = `maps://?q=${label}&ll=${lat},${lng}`;
  } else {
    // Android / Desktop: geo: URI opens Google Maps or any map app
    const geoLink = `geo:${lat},${lng}?q=${lat},${lng}(${label})`;
    const webLink = `https://www.google.com/maps?q=${lat},${lng}`;
    // Try geo: first; if it fails (desktop), open Google Maps web
    const a = document.createElement('a');
    a.href = geoLink;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    // Fallback for desktop after short delay
    setTimeout(() => {
      if (document.hasFocus()) window.open(webLink, '_blank');
    }, 800);
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── UTIL ──
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── BOOT ──
loadReport();
</script>
